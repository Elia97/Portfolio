<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Browser node -->
  <g data-svg-node="0">
    <rect x="18" y="105" width="98" height="70" rx="8"
      style="fill:var(--card);stroke:var(--border);stroke-width:1.5"/>
    <rect x="30" y="114" width="72" height="44" rx="3"
      style="fill:none;stroke:var(--muted-foreground);stroke-width:1;opacity:.45"/>
    <rect x="33" y="117" width="66" height="8" rx="2"
      style="fill:var(--border);opacity:.6"/>
    <rect x="35" y="128" width="28" height="5" rx="1.5"
      style="fill:var(--muted-foreground);opacity:.3"/>
    <rect x="35" y="136" width="44" height="5" rx="1.5"
      style="fill:var(--muted-foreground);opacity:.3"/>
    <rect x="35" y="144" width="36" height="5" rx="1.5"
      style="fill:var(--muted-foreground);opacity:.3"/>
    <line x1="67" y1="155" x2="67" y2="162"
      style="stroke:var(--muted-foreground);stroke-width:1.5;opacity:.4"/>
    <line x1="56" y1="162" x2="78" y2="162"
      style="stroke:var(--muted-foreground);stroke-width:1.5;opacity:.4"/>
    <text x="67" y="186" text-anchor="middle"
      font-family="monospace" font-size="9"
      style="fill:var(--muted-foreground)">Browser</text>
  </g>

  <!-- Arrow 0: Browser → API -->
  <line data-svg-arrow="0"
    x1="116" y1="140" x2="147" y2="140"
    pathLength="1" stroke-dasharray="1"
    style="stroke:var(--border);stroke-width:1.5"/>
  <polygon data-svg-arrow="0"
    points="147,136 155,140 147,144"
    style="fill:var(--border)"/>
  <text data-svg-arrow-label="0"
    x="131" y="130" text-anchor="middle"
    font-family="monospace" font-size="8"
    style="fill:var(--muted-foreground)">REST</text>

  <!-- API node (center, primary accent) -->
  <g data-svg-node="1">
    <rect x="155" y="88" width="90" height="105" rx="8"
      style="fill:var(--primary);fill-opacity:.08;stroke:var(--primary);stroke-width:1.5"/>
    <text x="200" y="128" text-anchor="middle"
      font-family="monospace" font-size="20" font-weight="700"
      style="fill:var(--primary)">API</text>
    <text x="200" y="146" text-anchor="middle"
      font-family="monospace" font-size="10"
      style="fill:var(--primary);opacity:.65">Node.js</text>
    <line x1="168" y1="157" x2="232" y2="157"
      style="stroke:var(--primary);stroke-width:.75;opacity:.3"/>
    <text x="200" y="172" text-anchor="middle"
      font-family="monospace" font-size="9"
      style="fill:var(--muted-foreground)">:3000</text>
    <text x="200" y="186" text-anchor="middle"
      font-family="monospace" font-size="9"
      style="fill:var(--muted-foreground)">TypeScript</text>
  </g>

  <!-- Arrow 1: API → DB -->
  <line data-svg-arrow="1"
    x1="245" y1="140" x2="279" y2="140"
    pathLength="1" stroke-dasharray="1"
    style="stroke:var(--border);stroke-width:1.5"/>
  <polygon data-svg-arrow="1"
    points="279,136 287,140 279,144"
    style="fill:var(--border)"/>
  <text data-svg-arrow-label="1"
    x="262" y="130" text-anchor="middle"
    font-family="monospace" font-size="8"
    style="fill:var(--muted-foreground)">SQL</text>

  <!-- DB node -->
  <g data-svg-node="2">
    <rect x="287" y="105" width="98" height="70" rx="8"
      style="fill:var(--card);stroke:var(--border);stroke-width:1.5"/>
    <ellipse cx="336" cy="122" rx="22" ry="7"
      style="fill:none;stroke:var(--muted-foreground);stroke-width:1;opacity:.45"/>
    <line x1="314" y1="122" x2="314" y2="150"
      style="stroke:var(--muted-foreground);stroke-width:1;opacity:.45"/>
    <line x1="358" y1="122" x2="358" y2="150"
      style="stroke:var(--muted-foreground);stroke-width:1;opacity:.45"/>
    <ellipse cx="336" cy="150" rx="22" ry="7"
      style="fill:none;stroke:var(--muted-foreground);stroke-width:1;opacity:.45"/>
    <text x="336" y="186" text-anchor="middle"
      font-family="monospace" font-size="9"
      style="fill:var(--muted-foreground)">PostgreSQL</text>
  </g>

  <!-- Response block -->
  <g data-svg-response>
    <rect x="50" y="218" width="300" height="64" rx="7"
      style="fill:var(--card);stroke:var(--border);stroke-width:1"/>
    <rect x="50" y="218" width="42" height="16" rx="7"
      style="fill:var(--primary);fill-opacity:.15"/>
    <rect x="64" y="218" width="28" height="16"
      style="fill:var(--primary);fill-opacity:.15"/>
    <text x="71" y="229" text-anchor="middle"
      font-family="monospace" font-size="8" font-weight="700"
      style="fill:var(--primary)">200</text>
    <rect x="66" y="234" width="1.5" height="40"
      style="fill:var(--border)"/>
    <rect x="76" y="237" width="30" height="6" rx="2"
      style="fill:var(--primary);opacity:.6"/>
    <rect x="112" y="237" width="80" height="6" rx="2"
      style="fill:var(--muted-foreground);opacity:.35"/>
    <rect x="76" y="249" width="22" height="6" rx="2"
      style="fill:var(--primary);opacity:.6"/>
    <rect x="104" y="249" width="110" height="6" rx="2"
      style="fill:var(--muted-foreground);opacity:.35"/>
    <rect x="76" y="261" width="16" height="6" rx="2"
      style="fill:var(--muted-foreground);opacity:.25"/>
  </g>

</svg>
