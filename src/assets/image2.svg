<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Ring track -->
  <circle cx="130" cy="148" r="72"
    style="stroke:var(--border);stroke-width:10;fill:none"/>

  <!-- Ring progress (pathLength=100, offset animated by GSAP) -->
  <circle data-svg-ring
    cx="130" cy="148" r="72"
    pathLength="100"
    stroke-dasharray="97 3"
   
    stroke-linecap="round"
    transform="rotate(-90 130 148)"
    style="stroke:var(--primary);stroke-width:10;fill:none"/>

  <!-- Score -->
  <text data-svg-score
    x="130" y="140" text-anchor="middle"
    font-family="monospace" font-size="44" font-weight="700"
   
    style="fill:var(--foreground)">97</text>
  <text data-svg-score
    x="130" y="162" text-anchor="middle"
    font-family="monospace" font-size="11"
   
    style="fill:var(--muted-foreground)">/ 100</text>
  <text data-svg-score
    x="130" y="180" text-anchor="middle"
    font-family="monospace" font-size="9"
   
    style="fill:var(--primary)">Lighthouse</text>

  <!-- Metrics -->
  <g transform="translate(240, 90)">

    <g data-svg-metric transform="translate(0,0)">
      <rect x="0" y="0" width="130" height="36" rx="6"
        style="fill:var(--card);stroke:var(--border);stroke-width:1"/>
      <text x="12" y="14" font-family="monospace" font-size="8"
        style="fill:var(--muted-foreground)">LCP</text>
      <text x="12" y="28" font-family="monospace" font-size="14" font-weight="700"
        style="fill:var(--primary)">0.8s</text>
      <circle cx="116" cy="18" r="6"
        style="fill:var(--primary);fill-opacity:.15;stroke:var(--primary);stroke-width:1"/>
      <text x="116" y="22" text-anchor="middle"
        font-family="monospace" font-size="8" font-weight="700"
        style="fill:var(--primary)">✓</text>
    </g>

    <g data-svg-metric transform="translate(0,48)">
      <rect x="0" y="0" width="130" height="36" rx="6"
        style="fill:var(--card);stroke:var(--border);stroke-width:1"/>
      <text x="12" y="14" font-family="monospace" font-size="8"
        style="fill:var(--muted-foreground)">FCP</text>
      <text x="12" y="28" font-family="monospace" font-size="14" font-weight="700"
        style="fill:var(--primary)">1.1s</text>
      <circle cx="116" cy="18" r="6"
        style="fill:var(--primary);fill-opacity:.15;stroke:var(--primary);stroke-width:1"/>
      <text x="116" y="22" text-anchor="middle"
        font-family="monospace" font-size="8" font-weight="700"
        style="fill:var(--primary)">✓</text>
    </g>

    <g data-svg-metric transform="translate(0,96)">
      <rect x="0" y="0" width="130" height="36" rx="6"
        style="fill:var(--card);stroke:var(--border);stroke-width:1"/>
      <text x="12" y="14" font-family="monospace" font-size="8"
        style="fill:var(--muted-foreground)">TTI</text>
      <text x="12" y="28" font-family="monospace" font-size="14" font-weight="700"
        style="fill:var(--primary)">1.4s</text>
      <circle cx="116" cy="18" r="6"
        style="fill:var(--primary);fill-opacity:.15;stroke:var(--primary);stroke-width:1"/>
      <text x="116" y="22" text-anchor="middle"
        font-family="monospace" font-size="8" font-weight="700"
        style="fill:var(--primary)">✓</text>
    </g>

    <g data-svg-metric transform="translate(0,144)">
      <rect x="0" y="0" width="130" height="36" rx="6"
        style="fill:var(--card);stroke:var(--border);stroke-width:1"/>
      <text x="12" y="14" font-family="monospace" font-size="8"
        style="fill:var(--muted-foreground)">CLS</text>
      <text x="12" y="28" font-family="monospace" font-size="14" font-weight="700"
        style="fill:var(--primary)">0.01</text>
      <circle cx="116" cy="18" r="6"
        style="fill:var(--primary);fill-opacity:.15;stroke:var(--primary);stroke-width:1"/>
      <text x="116" y="22" text-anchor="middle"
        font-family="monospace" font-size="8" font-weight="700"
        style="fill:var(--primary)">✓</text>
    </g>

  </g>

</svg>
